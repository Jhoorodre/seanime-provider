name: Auto Version Bump

on:
  workflow_dispatch:
    inputs:
      extension_folder:
        description: 'Folder name of the extension in src/ (e.g. darkmahou, hinatasoul, goyabu)'
        required: true
        type: string
      bump_type:
        description: 'Type of version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Locate Manifest
        id: locate_manifest
        run: |
          EXT_DIR="src/${{ github.event.inputs.extension_folder }}"
          if [ ! -d "$EXT_DIR" ]; then
            echo "❌ Directory $EXT_DIR does not exist"
            exit 1
          fi
          
          MANIFEST_PATH=$(find "$EXT_DIR" -name "*.json" | head -n 1)
          if [ -z "$MANIFEST_PATH" ]; then
            echo "❌ No JSON manifest found in $EXT_DIR"
            exit 1
          fi
          
          echo "path=$MANIFEST_PATH" >> $GITHUB_OUTPUT
          echo "📂 Found manifest: $MANIFEST_PATH"
          
      - name: Get current version
        id: current_version
        run: |
          MANIFEST_PATH="${{ steps.locate_manifest.outputs.path }}"
          CURRENT_VERSION=$(jq -r '.version' "$MANIFEST_PATH")
          NAME=$(jq -r '.name' "$MANIFEST_PATH")
          
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "📦 Current version for $NAME: $CURRENT_VERSION"
          
      - name: Calculate new version
        id: new_version
        run: |
          CURRENT_VERSION="${{ steps.current_version.outputs.current }}"
          BUMP_TYPE="${{ github.event.inputs.bump_type }}"
          
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          
          case $BUMP_TYPE in
            "major") major=$((major + 1)); minor=0; patch=0 ;;
            "minor") minor=$((minor + 1)); patch=0 ;;
            "patch") patch=$((patch + 1)) ;;
          esac
          
          NEW_VERSION="$major.$minor.$patch"
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "📦 New version: $NEW_VERSION"
          
      - name: Update version in manifest
        run: |
          MANIFEST_PATH="${{ steps.locate_manifest.outputs.path }}"
          NEW_VERSION="${{ steps.new_version.outputs.new }}"
          
          jq --arg version "$NEW_VERSION" '.version = $version' "$MANIFEST_PATH" > tmp.json
          mv tmp.json "$MANIFEST_PATH"
          
      - name: Commit version bump
        run: |
          MANIFEST_PATH="${{ steps.locate_manifest.outputs.path }}"
          NEW_VERSION="${{ steps.new_version.outputs.new }}"
          BUMP_TYPE="${{ github.event.inputs.bump_type }}"
          NAME="${{ steps.current_version.outputs.name }}"
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add "$MANIFEST_PATH"
          git commit -m "🔖 Bump $NAME version to $NEW_VERSION ($BUMP_TYPE)"
          git tag -a "${{ github.event.inputs.extension_folder }}-v$NEW_VERSION" -m "Release $NAME v$NEW_VERSION"
          
      - name: Push changes
        run: |
          git push origin master
          git push origin --tags