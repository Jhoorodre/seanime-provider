name: Validate Seanime Providers

on:
  push:
    branches: [master, main]
    paths: 
      - 'src/**/*.ts'
      - 'src/**/*.json'
  pull_request:
    branches: [master, main]
    paths:
      - 'src/**/*.ts' 
      - 'src/**/*.json'
  workflow_dispatch:

jobs:
  validate:
    name: Validate Extensions
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Validate JSON manifests and TS files
        run: |
          echo "🔍 Validating all extensions..."
          
          echo "📋 **Deployment Summary**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Provider | Type | Version | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|---------|--------|" >> $GITHUB_STEP_SUMMARY

          for manifest in src/*/*.json; do
            dir=$(dirname "$manifest")
            ts_file="${manifest%.json}.ts"
            
            echo "----------------------------------------"
            echo "📦 Checking $dir"
            
            if [ ! -f "$ts_file" ]; then
              echo "⚠️  No matching TS file found for $manifest"
              continue
            fi
            
            if ! jq empty "$manifest"; then
              echo "❌ Invalid JSON in $manifest"
              exit 1
            fi
            
            ID=$(jq -r '.id' "$manifest")
            NAME=$(jq -r '.name' "$manifest")
            TYPE=$(jq -r '.type' "$manifest")
            VERSION=$(jq -r '.version' "$manifest")
            
            IS_DEV=$(jq -r '.isDevelopment // false' "$manifest")
            
            if [ "$ID" = "null" ] || [ "$NAME" = "null" ] || [ "$TYPE" = "null" ] || [ "$VERSION" = "null" ]; then
              echo "❌ Missing required fields in $manifest"
              exit 1
            fi
            
            if ! grep -q "class " "$ts_file"; then
              echo "❌ Provider class not found in $ts_file"
              exit 1
            fi
            
            if [ "$IS_DEV" = "true" ]; then
              STATUS="🚧 In Dev"
              echo "🚧 $NAME (v$VERSION) is marked as In Development."
            else
              STATUS="✅ Pass"
              echo "✅ $NAME (v$VERSION) passed validation."
            fi
            
            echo "| $NAME | $TYPE | \`$VERSION\` | $STATUS |" >> $GITHUB_STEP_SUMMARY
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🚀 **All extensions passed validation!**" >> $GITHUB_STEP_SUMMARY

      - name: Validate Marketplace Registry
        run: |
          echo "🔍 Cross-referencing extensions with marketplace.json..."
          if [ ! -f "marketplace.json" ]; then
            echo "⚠️  marketplace.json not found in root. Skipping registry check."
            exit 0
          fi
          
          MARKETPLACE_IDS=$(jq -r '.[].id' marketplace.json)
          MISSING=0
          
          echo "📋 **Marketplace Sync Check**" >> $GITHUB_STEP_SUMMARY
          
          for manifest in src/*/*.json; do
            ID=$(jq -r '.id' "$manifest")
            if ! echo "$MARKETPLACE_IDS" | grep -q "^$ID$"; then
              echo "⚠️  WARNING: Extension '$ID' ($manifest) is NOT registered in marketplace.json!"
              echo "- ⚠️ **$ID** is missing from \`marketplace.json\`" >> $GITHUB_STEP_SUMMARY
              MISSING=$((MISSING+1))
            fi
          done
          
          if [ $MISSING -gt 0 ]; then
            echo "❌ Found $MISSING extensions missing from marketplace.json."
            # Uncomment the next line if you want to force the pipeline to fail when an extension isn't in the marketplace
            # exit 1
          else
            echo "✅ All extensions are correctly registered in the marketplace."
            echo "✅ Marketplace is 100% in sync!" >> $GITHUB_STEP_SUMMARY
          fi